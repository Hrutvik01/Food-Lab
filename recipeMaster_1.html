<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Food Lab | Master Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 320px; height: 100vh; position: fixed; background: #0a0a0f; border-right: 1px solid #1a1a24; z-index: 50; }
        .main-view { margin-left: 320px; padding: 40px; height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
        
        /* Scrollbar Management */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Form & Card Elements */
        .glass-card { background: #11111a; border: 1px solid #1a1a24; border-radius: 24px; padding: 32px; }
        input[type="text"], input[type="number"], input[type="url"], textarea { 
            background: #0a0a0f !important; border: 1px solid #2d2d3d !important; color: white !important; outline: none; transition: 0.3s; 
        }
        input:focus, textarea:focus { border-color: #f97316 !important; box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); }
        
        /* Horizontal Recipe Cards */
        .recipe-card-horizontal { 
            background: #11111a; border-radius: 28px; overflow: hidden; display: flex; transition: 0.3s; border: 1px solid #1a1a24; height: 160px; 
        }
        .recipe-card-horizontal:hover { border-color: #f97316; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(249,115,22,0.2); }
        .card-img-container { width: 160px; height: 100%; flex-shrink: 0; position: relative; }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Navigation */
        .nav-item { transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 16px; color: #64748b; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-item:hover, .nav-item.active { background: rgba(249, 115, 22, 0.1); color: #fdba74; }
        
        /* XP System */
        .xp-bar { height: 6px; background: #1a1a24; border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #f97316, #fdba74); transition: width 0.8s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DEFAULT_RECIPES = [
            { 
                id: 1, title: "Midnight Honey Pasta", author: "@Chef_Chaos", 
                mainImg: "https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=800",
                ingredients: [{ name: "Spaghetti", amount: 200, unit: "g", impAmount: 7, impUnit: "oz" }, { name: "Honey", amount: 2, unit: "tbsp", impAmount: 2, impUnit: "tbsp" }],
                steps: [{ text: "Boil pasta in salted water", img: "https://images.unsplash.com/photo-1551462147-37885acc3c41?w=800" }, { text: "Infuse honey glaze", img: "https://images.unsplash.com/photo-1590080875515-8a03b1447d19?w=800" }]
            }
        ];

        const RecipeMasterApp = () => {
            const storedSession = JSON.parse(localStorage.getItem('active_session')) || { 
                name: 'Master Guest', email: 'guest@lab.com', role: 'Recipe Master', pfp: 'https://via.placeholder.com/150/f97316/ffffff?text=M', xp: 1200 
            };
            
            const [user, setUser] = useState(storedSession);
            const [activeTab, setActiveTab] = useState('create'); // Defaulting to 'create' to show off the form
            const [recipes, setRecipes] = useState([]);
            
            const [newRecipe, setNewRecipe] = useState({
                title: '', mainImg: '',
                ingredients: [{ name: '', amount: '', unit: 'g', impAmount: '', impUnit: 'oz' }],
                steps: [{ text: '', img: '' }]
            });

            useEffect(() => {
                const db = JSON.parse(localStorage.getItem('lab_recipes'));
                if (!db || db.length === 0) {
                    localStorage.setItem('lab_recipes', JSON.stringify(DEFAULT_RECIPES));
                    setRecipes(DEFAULT_RECIPES);
                } else {
                    setRecipes(db);
                }
            }, []);

            const level = Math.floor((user.xp || 0) / 1000) + 1;
            const myRecipes = recipes.filter(r => r.author === user.name || r.author === `@${user.name.replace(/\s+/g, '_')}`);

            // --- FORM HANDLERS ---
            const addIngredientRow = () => setNewRecipe({ ...newRecipe, ingredients: [...newRecipe.ingredients, { name: '', amount: '', unit: 'g', impAmount: '', impUnit: 'oz' }] });
            const addStepRow = () => setNewRecipe({ ...newRecipe, steps: [...newRecipe.steps, { text: '', img: '' }] });
            
            const updateIngredient = (index, field, value) => {
                const updated = [...newRecipe.ingredients];
                updated[index][field] = value;
                setNewRecipe({ ...newRecipe, ingredients: updated });
            };

            const updateStep = (index, field, value) => {
                const updated = [...newRecipe.steps];
                updated[index][field] = value;
                setNewRecipe({ ...newRecipe, steps: updated });
            };

            const handleMainImgUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setNewRecipe({ ...newRecipe, mainImg: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const handleStepImgUpload = (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const updated = [...newRecipe.steps];
                        updated[index].img = reader.result;
                        setNewRecipe({ ...newRecipe, steps: updated });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const publishRecipe = (e) => {
                e.preventDefault();
                const recipeToSave = { ...newRecipe, id: Date.now(), author: `@${user.name.replace(/\s+/g, '_')}` };
                
                const updatedDB = [recipeToSave, ...recipes];
                localStorage.setItem('lab_recipes', JSON.stringify(updatedDB));
                setRecipes(updatedDB);
                
                const usersDb = JSON.parse(localStorage.getItem('lab_users') || '[]');
                const idx = usersDb.findIndex(u => u.email === user.email);
                if(idx !== -1) {
                    usersDb[idx].xp = (usersDb[idx].xp || 0) + 500;
                    localStorage.setItem('lab_users', JSON.stringify(usersDb));
                    setUser(usersDb[idx]);
                    localStorage.setItem('active_session', JSON.stringify(usersDb[idx]));
                }

                alert("Protocol Published to Discovery Feed! +500 XP");
                setActiveTab('my_protocols');
                setNewRecipe({ title: '', mainImg: '', ingredients: [{ name: '', amount: '', unit: 'g', impAmount: '', impUnit: 'oz' }], steps: [{ text: '', img: '' }] });
            };

            return (
                <div className="flex bg-[#050505]">
                    {/* SIDEBAR */}
                    <aside className="sidebar flex flex-col p-8 no-scrollbar">
                        <div className="mb-10">
                            <h2 className="text-2xl font-black italic text-orange-500 tracking-tighter">THE FOOD LAB</h2>
                            <p className="text-[10px] text-gray-500 font-mono tracking-widest uppercase mt-1">Master Dashboard</p>
                        </div>

                        {/* Profile Card */}
                        <div className="bg-[#11111a] p-5 rounded-3xl border border-orange-500/20 mb-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-orange-600/10 rounded-full blur-xl"></div>
                            <div className="flex items-center gap-4 mb-4 relative">
                                <img src={user.pfp} className="w-12 h-12 rounded-2xl object-cover border border-white/10" />
                                <div>
                                    <p className="text-sm font-bold truncate w-32">{user.name}</p>
                                    <p className="text-[10px] text-orange-400 font-black uppercase tracking-widest">{user.role}</p>
                                </div>
                            </div>
                            <div className="xp-bar mb-2 relative"><div className="xp-fill" style={{width: `${((user.xp||0)%1000)/10}%`}}></div></div>
                            <div className="flex justify-between text-[9px] font-bold text-gray-500 uppercase font-mono">
                                <span>Level 0{level} Master</span>
                                <span>{(user.xp||0)%1000}/1000 XP</span>
                            </div>
                        </div>

                        {/* Navigation */}
                        <nav className="flex-1 space-y-2">
                            <div className={`nav-item ${activeTab === 'dashboard' && 'active'}`} onClick={() => setActiveTab('dashboard')}>
                                <i className="fas fa-chart-network text-lg"></i> Command Center
                            </div>
                            <div className={`nav-item ${activeTab === 'create' && 'active'}`} onClick={() => setActiveTab('create')}>
                                <i className="fas fa-flask text-lg"></i> Create Protocol
                            </div>
                            <div className={`nav-item ${activeTab === 'my_protocols' && 'active'}`} onClick={() => setActiveTab('my_protocols')}>
                                <i className="fas fa-vial text-lg"></i> My Experiments
                            </div>
                        </nav>

                        <button onClick={() => { localStorage.removeItem('active_session'); window.location.href='login_1.html'; }} className="mt-6 pt-6 border-t border-white/5 text-[10px] font-black text-gray-600 hover:text-white uppercase tracking-widest transition text-left">
                            <i className="fas fa-power-off mr-2"></i> Terminate Session
                        </button>
                    </aside>

                    {/* MAIN VIEW */}
                    <main className="main-view flex-1 no-scrollbar">
                        
                        {/* DASHBOARD TAB */}
                        {activeTab === 'dashboard' && (
                            <div className="animate-in fade-in">
                                <header className="mb-12">
                                    <h1 className="text-6xl font-black italic uppercase tracking-tighter">Innovator <span className="text-orange-500">Hub</span></h1>
                                </header>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                                    <div className="glass-card border-l-4 border-orange-500">
                                        <p className="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2">Protocols Published</p>
                                        <p className="text-5xl font-black italic">{myRecipes.length}</p>
                                    </div>
                                    <div className="glass-card border-l-4 border-violet-500">
                                        <p className="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2">Global Saves (Est.)</p>
                                        <p className="text-5xl font-black italic text-violet-400">{myRecipes.length * 24}</p>
                                    </div>
                                    <div className="glass-card border-l-4 border-green-500">
                                        <p className="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2">Total Experience (XP)</p>
                                        <p className="text-5xl font-black italic text-green-400">{user.xp || 0}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* CREATE PROTOCOL TAB */}
                        {activeTab === 'create' && (
                            <div className="animate-in fade-in max-w-5xl">
                                <header className="mb-12 flex justify-between items-end">
                                    <div>
                                        <h1 className="text-6xl font-black italic uppercase tracking-tighter">Document <span className="text-orange-500">Protocol</span></h1>
                                        <p className="text-gray-500 text-sm mt-2">Synthesize and publish your culinary reactions.</p>
                                    </div>
                                    <button onClick={publishRecipe} className="px-8 py-4 bg-orange-600 hover:bg-orange-700 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-orange-900/30 transition">
                                        Publish to Feed
                                    </button>
                                </header>

                                <form className="space-y-10" onSubmit={publishRecipe}>
                                    {/* 1. Primary Metadata */}
                                    <div className="glass-card space-y-6">
                                        <h3 className="text-[11px] font-black uppercase text-orange-500 tracking-widest border-b border-[#2d2d3d] pb-4">1. Primary Metadata</h3>
                                        <div>
                                            <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Protocol Title</label>
                                            <input type="text" required placeholder="e.g. Neon Garlic Shrimp" className="w-full p-4 rounded-xl font-bold text-lg" value={newRecipe.title} onChange={e => setNewRecipe({...newRecipe, title: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Primary Image (Result)</label>
                                            <input 
                                                type="file" accept="image/*" required={!newRecipe.mainImg} 
                                                className="w-full p-3 rounded-xl text-sm font-mono bg-[#0a0a0f] border border-[#2d2d3d] text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-widest file:bg-orange-600/20 file:text-orange-500 hover:file:bg-orange-600/30 transition-all cursor-pointer" 
                                                onChange={handleMainImgUpload} 
                                            />
                                            {newRecipe.mainImg && (
                                                <div className="mt-4 w-32 h-32 rounded-xl overflow-hidden border border-[#2d2d3d]">
                                                    <img src={newRecipe.mainImg} className="w-full h-full object-cover" />
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* 2. Reagents */}
                                    <div className="glass-card space-y-6">
                                        <div className="flex justify-between items-end border-b border-[#2d2d3d] pb-4">
                                            <h3 className="text-[11px] font-black uppercase text-orange-500 tracking-widest">2. Chemical Reagents (Ingredients)</h3>
                                            <button type="button" onClick={addIngredientRow} className="text-[10px] font-black uppercase tracking-widest text-violet-400 hover:text-violet-300">+ Add Reagent</button>
                                        </div>
                                        
                                        {newRecipe.ingredients.map((ing, i) => (
                                            <div key={i} className="flex gap-4 items-start bg-[#0a0a0f] p-5 rounded-xl border border-[#1a1a24]">
                                                <div className="flex-1">
                                                    <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Subject Name</label>
                                                    <input type="text" required placeholder="e.g. Spaghetti" className="w-full p-3 rounded-lg text-sm font-bold bg-[#11111a]" value={ing.name} onChange={e => updateIngredient(i, 'name', e.target.value)} />
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Metric Amt</label>
                                                    <input type="number" required placeholder="200" className="w-full p-3 rounded-lg text-sm font-mono bg-[#11111a]" value={ing.amount} onChange={e => updateIngredient(i, 'amount', e.target.value)} />
                                                </div>
                                                <div className="w-20">
                                                    <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Unit</label>
                                                    <input type="text" required placeholder="g" className="w-full p-3 rounded-lg text-sm font-mono bg-[#11111a]" value={ing.unit} onChange={e => updateIngredient(i, 'unit', e.target.value)} />
                                                </div>
                                                <div className="w-24">
                                                    <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Imp. Amt</label>
                                                    <input type="number" required placeholder="7" className="w-full p-3 rounded-lg text-sm font-mono bg-[#11111a]" value={ing.impAmount} onChange={e => updateIngredient(i, 'impAmount', e.target.value)} />
                                                </div>
                                                <div className="w-20">
                                                    <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Unit</label>
                                                    <input type="text" required placeholder="oz" className="w-full p-3 rounded-lg text-sm font-mono bg-[#11111a]" value={ing.impUnit} onChange={e => updateIngredient(i, 'impUnit', e.target.value)} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 3. Steps */}
                                    <div className="glass-card space-y-6">
                                        <div className="flex justify-between items-end border-b border-[#2d2d3d] pb-4">
                                            <h3 className="text-[11px] font-black uppercase text-orange-500 tracking-widest">3. Execution Protocol (Phases)</h3>
                                            <button type="button" onClick={addStepRow} className="text-[10px] font-black uppercase tracking-widest text-violet-400 hover:text-violet-300">+ Add Phase</button>
                                        </div>

                                        {newRecipe.steps.map((step, i) => (
                                            <div key={i} className="flex gap-6 items-start bg-[#0a0a0f] p-6 rounded-2xl border border-[#1a1a24]">
                                                <div className="w-8 h-8 rounded-full bg-orange-600 text-white flex items-center justify-center font-black text-xs flex-shrink-0 shadow-lg shadow-orange-900/40">{i+1}</div>
                                                <div className="flex-1 space-y-5">
                                                    <div>
                                                        <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Phase Instruction</label>
                                                        <textarea required placeholder="Describe the action..." className="w-full p-4 rounded-xl text-sm leading-relaxed min-h-[100px] bg-[#11111a] font-medium" value={step.text} onChange={e => updateStep(i, 'text', e.target.value)}></textarea>
                                                    </div>
                                                    <div>
                                                        <label className="block text-[9px] font-bold text-gray-500 uppercase mb-2">Phase Image (Crucial for Analyzer)</label>
                                                        <input 
                                                            type="file" accept="image/*" required={!step.img} 
                                                            className="w-full p-2.5 rounded-xl text-xs font-mono bg-[#11111a] border border-[#2d2d3d] text-gray-400 file:mr-4 file:py-1.5 file:px-4 file:rounded-xl file:border-0 file:text-[9px] file:font-black file:uppercase file:tracking-widest file:bg-orange-600/20 file:text-orange-500 hover:file:bg-orange-600/30 transition-all cursor-pointer" 
                                                            onChange={(e) => handleStepImgUpload(i, e)} 
                                                        />
                                                        {step.img && (
                                                            <div className="mt-4 w-32 h-20 rounded-xl overflow-hidden border border-[#2d2d3d]">
                                                                <img src={step.img} className="w-full h-full object-cover" />
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </form>
                            </div>
                        )}

                        {/* MY PROTOCOLS TAB (Horizontal Theme Match) */}
                        {activeTab === 'my_protocols' && (
                             <div className="animate-in fade-in max-w-7xl">
                                <header className="mb-12">
                                    <h1 className="text-6xl font-black italic uppercase tracking-tighter">My <span className="text-orange-500">Experiments</span></h1>
                                </header>
                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                                    {myRecipes.map(recipe => (
                                        <div key={recipe.id} className="recipe-card-horizontal group">
                                            <div className="card-img-container relative">
                                                <img src={recipe.mainImg} className="transition-transform duration-700 group-hover:scale-110" />
                                            </div>
                                            <div className="p-6 flex-1 flex flex-col justify-between">
                                                <div>
                                                    <h3 className="text-2xl font-black italic mb-1 leading-tight truncate">{recipe.title}</h3>
                                                    <p className="text-[10px] text-orange-400 font-mono uppercase tracking-widest">{recipe.steps.length} Phases • {recipe.ingredients.length} Reagents</p>
                                                </div>
                                                <div className="flex gap-3">
                                                    <button className="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">Edit Protocol</button>
                                                    <button className="flex-1 bg-red-500/10 border border-red-500/20 text-red-500 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition">Delete</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {myRecipes.length === 0 && (
                                        <div className="col-span-full p-12 text-center border-2 border-dashed border-[#1a1a24] rounded-3xl">
                                            <p className="text-gray-500 font-mono italic text-sm">No protocols published yet.</p>
                                        </div>
                                    )}
                                </div>
                             </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RecipeMasterApp />);
    </script>
</body>
</html>
