<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Food Lab | Subject Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        .sidebar { width: 320px; height: 100vh; position: fixed; background: #0a0a0f; border-right: 1px solid #1a1a24; z-index: 50; }
        .main-view { margin-left: 320px; padding: 40px; height: 100vh; overflow-y: auto; scroll-behavior: smooth;}
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .recipe-card-horizontal { background: #11111a; border-radius: 28px; overflow: hidden; display: flex; transition: 0.3s; border: 1px solid #1a1a24; height: 160px; }
        .recipe-card-horizontal:hover { border-color: #7c3aed; transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(124,58,237,0.2); }
        .card-img-container { width: 160px; height: 100%; flex-shrink: 0; position: relative; }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .glass-popup { background: #11111a; border-radius: 32px; width: 1000px; max-width: 95%; height: 80vh; display: flex; overflow: hidden; border: 1px solid #2d2d3d; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .popup-left { width: 45%; position: relative; }
        .popup-right { flex: 1; padding: 40px; overflow-y: auto; background: #0a0a0f; }
        
        .xp-bar { height: 6px; background: #1a1a24; border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); transition: width 0.8s ease; }
        
        .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transition: 0.4s; }
        .animate-pop { animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Fallback data if the database is completely empty
        const DEFAULT_RECIPES = [
            { 
                id: 1, title: "Midnight Honey Pasta", author: "@Chef_Chaos", 
                mainImg: "https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=800",
                ingredients: [
                    { name: "Spaghetti", amount: 200, unit: "g", impAmount: 7, impUnit: "oz" },
                    { name: "Honey", amount: 2, unit: "tbsp", impAmount: 2, impUnit: "tbsp" }
                ],
                steps: [
                    { text: "Boil pasta in salted water until al dente", img: "https://images.unsplash.com/photo-1551462147-37885acc3c41?w=800" },
                    { text: "Infuse honey with chili in a pan over low heat", img: "https://images.unsplash.com/photo-1590080875515-8a03b1447d19?w=800" }
                ]
            }
        ];

        const UserPortal = () => {
            const storedSession = JSON.parse(localStorage.getItem('active_session')) || { 
                name: 'Guest', email: '', role: 'Explorer', pfp: 'https://via.placeholder.com/150/7c3aed/ffffff?text=U', xp: 0, saved: [], reagents: [] 
            };

            const [user, setUser] = useState(storedSession);
            const [selected, setSelected] = useState(null);
            const [stepIdx, setStepIdx] = useState(0);
            const [multi, setMulti] = useState(1);
            const [isMetric, setIsMetric] = useState(true);
            
            // Database States
            const [globalRecipes, setGlobalRecipes] = useState([]);
            const [xp, setXp] = useState(user.xp || 0);
            const [book, setBook] = useState(user.saved || []);
            const [reagents, setReagents] = useState(user.reagents || []);

            // 1. REAL-TIME RECIPE SYNC (Listens to the Master Portal)
            useEffect(() => {
                const fetchRecipes = () => {
                    const db = JSON.parse(localStorage.getItem('lab_recipes'));
                    if (!db || db.length === 0) {
                        setGlobalRecipes(DEFAULT_RECIPES);
                    } else {
                        setGlobalRecipes(db);
                    }
                };

                // Initial fetch
                fetchRecipes();

                // Listen for changes made in other tabs (Master publishing)
                window.addEventListener('storage', fetchRecipes);
                return () => window.removeEventListener('storage', fetchRecipes);
            }, []);

            // 2. REAL-TIME USER PROFILE SYNC
            useEffect(() => {
                if(user.email) {
                    const db = JSON.parse(localStorage.getItem('lab_users') || '[]');
                    const idx = db.findIndex(u => u.email === user.email && u.role === user.role);
                    if (idx !== -1) {
                        db[idx].xp = xp;
                        db[idx].saved = book;
                        db[idx].reagents = reagents;
                        localStorage.setItem('lab_users', JSON.stringify(db));
                        localStorage.setItem('active_session', JSON.stringify(db[idx]));
                    }
                }
            }, [xp, book, reagents]);

            const level = Math.floor(xp / 1000) + 1;
            const handleAnalyze = (r) => { setSelected(r); setStepIdx(0); setMulti(1); };
            const toggleSave = (r) => {
                if(book.find(x => x.id === r.id)) setBook(book.filter(x => x.id !== r.id));
                else setBook([...book, r]);
            };
            const addReagent = (r) => { setReagents([...new Set([...reagents, ...r.ingredients.map(i => i.name)])]); };

            const completeExperiment = () => {
                setXp(xp + 150);
                setSelected(null);
                alert("Experiment Concluded! +150 XP Synced to Profile.");
            };

            return (
                <div className="flex">
                    {/* SIDEBAR */}
                    <aside className="sidebar p-8 flex flex-col no-scrollbar">
                        <div className="mb-10"><h2 className="text-2xl font-black italic text-violet-500 tracking-tighter">THE FOOD LAB</h2></div>

                        <div className="bg-[#161622] p-5 rounded-3xl border border-white/5 mb-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-24 h-24 bg-violet-600/10 rounded-full blur-xl"></div>
                            <div className="flex items-center gap-4 mb-4 relative">
                                <img src={user.pfp} className="w-12 h-12 rounded-2xl object-cover border border-white/10" />
                                <div>
                                    <p className="text-sm font-bold truncate w-32">{user.name}</p>
                                    <p className="text-[10px] text-violet-400 font-bold uppercase tracking-widest">Rank: {user.role}</p>
                                </div>
                            </div>
                            <div className="xp-bar mb-2 relative"><div className="xp-fill" style={{width: `${(xp%1000)/10}%`}}></div></div>
                            <div className="flex justify-between text-[9px] font-bold text-gray-500 uppercase font-mono">
                                <span>Level 0{level}</span>
                                <span>{xp%1000}/1000 XP</span>
                            </div>
                        </div>

                        <div className="flex-1 overflow-hidden flex flex-col space-y-8">
                            <div className="flex flex-col h-1/3">
                                <h3 className="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-3 flex justify-between items-center">
                                    <span>Lab Reagents</span>
                                    <i className="fas fa-flask text-violet-500 cursor-pointer" onClick={() => setReagents([])}></i>
                                </h3>
                                <div className="flex-1 overflow-y-auto no-scrollbar bg-white/5 rounded-2xl p-3 border border-white/5">
                                    {reagents.map((t,i) => <div key={i} className="text-[10px] font-mono text-gray-400 mb-1.5 flex items-center gap-2"><div className="w-1 h-1 bg-violet-500 rounded-full"></div>{t}</div>)}
                                    {reagents.length === 0 && <p className="text-[10px] italic text-gray-600">Inventory Clear</p>}
                                </div>
                            </div>

                            <div className="flex-1 flex flex-col overflow-hidden">
                                <h3 className="text-[10px] font-black text-gray-600 uppercase tracking-widest mb-3">My Recipe Book</h3>
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-2">
                                    {book.map(r => (
                                        <div key={r.id} onClick={() => handleAnalyze(r)} className="p-3 bg-white/5 rounded-xl cursor-pointer group hover:bg-violet-600/10 border border-transparent hover:border-violet-500/30 transition">
                                            <p className="text-xs font-bold group-hover:text-violet-400 transition truncate">{r.title}</p>
                                            <p className="text-[9px] text-gray-600 font-mono mt-1 uppercase">{r.author}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <button onClick={() => { localStorage.removeItem('active_session'); window.location.href='login_1.html'; }} className="mt-6 pt-6 border-t border-white/5 text-[10px] font-black text-gray-600 hover:text-white uppercase tracking-widest transition text-left">
                            <i className="fas fa-power-off mr-2"></i> Terminate Session
                        </button>
                    </aside>

                    {/* MAIN FEED */}
                    <main className="main-view flex-1 no-scrollbar">
                        <header className="mb-12 flex justify-between items-end">
                            <div>
                                <h1 className="text-6xl font-black italic uppercase tracking-tighter">Discovery <span className="text-violet-500">Feed</span></h1>
                                <p className="text-gray-500 text-sm mt-2">Synchronized with Global Recipe Masters.</p>
                            </div>
                            <button onClick={() => setIsMetric(!isMetric)} className="px-5 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest hover:border-violet-500 transition">
                                <i className="fas fa-weight-hanging mr-2"></i> {isMetric ? 'Metric' : 'Imperial'}
                            </button>
                        </header>

                        {/* RENDER DYNAMIC RECIPES FROM DATABASE */}
                        <div className="grid grid-cols-1 2xl:grid-cols-2 gap-8">
                            {globalRecipes.map(recipe => (
                                <div key={recipe.id} className="recipe-card-horizontal">
                                    <div className="card-img-container relative">
                                        <img src={recipe.mainImg} />
                                        <button onClick={() => addReagent(recipe)} className="absolute top-3 right-3 w-8 h-8 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center hover:bg-violet-600 transition"><i className="fas fa-cart-plus text-xs"></i></button>
                                    </div>
                                    <div className="p-6 flex-1 flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-2xl font-black italic mb-1 leading-tight truncate">{recipe.title}</h3>
                                            <p className="text-[10px] text-violet-400 font-mono uppercase tracking-widest">{recipe.author}</p>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={() => handleAnalyze(recipe)} className="flex-[4] bg-violet-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-violet-700 shadow-lg shadow-violet-900/30">Analyze Phase</button>
                                            <button onClick={() => toggleSave(recipe)} className={`flex-1 border rounded-xl flex items-center justify-center transition ${book.find(x => x.id === recipe.id) ? 'bg-violet-600/20 border-violet-500 text-violet-400' : 'bg-white/5 border-white/10 text-gray-500 hover:text-white'}`}>
                                                <i className={`${book.find(x => x.id === recipe.id) ? 'fas' : 'far'} fa-bookmark`}></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {globalRecipes.length === 0 && (
                                <div className="col-span-full p-12 text-center border-2 border-dashed border-[#1a1a24] rounded-3xl">
                                    <p className="text-gray-500 font-mono italic text-sm">No protocols published yet. Waiting for Recipe Masters...</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* CUSTOM ANALYZER POPUP */}
                    {selected && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-lg" onClick={() => setSelected(null)}></div>
                            <div className="glass-popup relative animate-pop">
                                
                                <div className="absolute top-6 left-1/2 -translate-x-1/2 z-50 px-4 py-2 bg-[#11111a]/80 backdrop-blur-md border border-violet-500/30 rounded-full flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-violet-500 animate-pulse"></div>
                                    <span className="text-[9px] font-black uppercase tracking-widest">Voice Protocol Ready</span>
                                </div>

                                <button className="absolute top-6 right-6 w-10 h-10 bg-white/5 rounded-full flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 transition z-50" onClick={() => setSelected(null)}>
                                    <i className="fas fa-times"></i>
                                </button>
                                
                                <div className="popup-left hidden lg:block">
                                    <img key={stepIdx} src={selected.steps[stepIdx].img} className="absolute inset-0 w-full h-full object-cover opacity-60 transition-opacity duration-500" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-transparent to-transparent"></div>
                                    <div className="absolute bottom-12 left-10 right-10">
                                        <h2 className="text-5xl font-black italic uppercase leading-none mb-4 tracking-tighter">{selected.title}</h2>
                                        <div className="flex items-center gap-3"><div className="w-10 h-[2px] bg-violet-500"></div><span className="text-[10px] font-black font-mono text-violet-400 uppercase tracking-widest">{selected.author}</span></div>
                                    </div>
                                </div>

                                <div className="popup-right no-scrollbar flex flex-col">
                                    <div className="mb-10">
                                        <h4 className="text-[10px] font-black uppercase text-violet-500 tracking-widest mb-4">Ingredient Multiplier</h4>
                                        <div className="flex gap-2">
                                            {[1, 2, 4].map(n => (
                                                <button key={n} onClick={() => setMulti(n)} className={`flex-1 py-3.5 rounded-2xl text-[10px] font-black uppercase transition-all ${multi === n ? 'bg-white text-black shadow-lg shadow-white/10' : 'bg-[#1a1a24] text-gray-500 hover:bg-[#2d2d3d]'}`}>{n}x Servings</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="mb-12">
                                        <h4 className="text-[10px] font-black uppercase text-violet-500 tracking-widest mb-5">Chemical Composition</h4>
                                        <div className="space-y-4">
                                            {selected.ingredients.map((ing, i) => (
                                                <div key={i} className="flex justify-between items-center border-b border-white/5 pb-3 text-xs">
                                                    <span className="font-bold">{ing.name}</span>
                                                    <span className="font-mono text-violet-400">
                                                        {isMetric ? `${ing.amount * multi} ${ing.unit}` : `${parseInt(ing.impAmount || 0) * multi} ${ing.impUnit || ''}`}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        <h4 className="text-[10px] font-black uppercase text-violet-500 tracking-widest mb-6">Execution Protocol</h4>
                                        <div className="space-y-6">
                                            {selected.steps.map((s, i) => (
                                                <div key={i} className={`flex gap-5 transition-all duration-500 ${stepIdx === i ? 'opacity-100 scale-100' : 'opacity-20 scale-95 grayscale'}`}>
                                                    <div className={`step-circle flex-shrink-0 ${stepIdx === i ? 'bg-violet-600 shadow-lg shadow-violet-900/40' : 'bg-white/10'}`}>{i+1}</div>
                                                    <p className="text-sm font-bold pt-1 leading-relaxed">{s.text}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex gap-3 mt-10 pt-6 border-t border-white/5">
                                        <button onClick={() => setStepIdx(Math.max(0, stepIdx - 1))} className="flex-[2] py-4 bg-[#1a1a24] rounded-2xl text-[10px] font-black uppercase hover:bg-white/10 transition">Back</button>
                                        {stepIdx === selected.steps.length - 1 ? (
                                            <button onClick={completeExperiment} className="flex-[5] bg-green-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-green-700 shadow-xl shadow-green-900/20 transition">Conclude Trial</button>
                                        ) : (
                                            <button onClick={() => setStepIdx(prev => prev + 1)} className="flex-[5] bg-violet-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-violet-700 shadow-xl shadow-violet-900/20 transition">Next Phase</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserPortal />);
    </script>
</body>
</html>
